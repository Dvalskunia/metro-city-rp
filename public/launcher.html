<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ლაუნჩერი - METRO CITY RP</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00d4ff;
            --blue-glow: rgba(0, 212, 255, 0.4);
            --black: #000;
            --white: #fff;
            --gray: #8899aa;
            --red: #ff4444;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px) brightness(0.25);
            transform: scale(1.1);
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(0,212,255,0.05) 0%, rgba(0,0,0,0.8) 100%);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: rgba(0,0,0,0.7);
            border-bottom: 1px solid rgba(0,212,255,0.08);
        }

        .nav-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 16px;
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 6px;
            transition: color 0.3s, border-color 0.3s;
        }

        .nav-home:hover {
            color: var(--blue);
            border-color: var(--blue);
        }

        .nav-home svg { width: 14px; height: 14px; fill: currentColor; }

        .nav-brand {
            font-size: 8px;
            color: rgba(0,212,255,0.2);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 130px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 25px var(--blue-glow));
        }

        .title {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2.2rem, 6vw, 4rem);
            color: var(--blue);
            text-shadow: 0 0 20px var(--blue-glow), 3px 3px 0 #003366;
            margin-bottom: 4px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: rgba(255,255,255,0.6);
            letter-spacing: 16px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .card {
            background: rgba(5, 10, 20, 0.85);
            border: 1px solid rgba(0, 212, 255, 0.12);
            border-radius: 20px;
            padding: 48px 52px;
            max-width: 480px;
            margin: 0 auto;
        }

        .card-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg { width: 34px; height: 34px; fill: var(--blue); opacity: 0.8; }

        .card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 10px;
            padding: 14px 28px;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
        }

        .badge span {
            font-size: 11px;
            font-weight: 700;
            color: #ff6666;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.12);
            border-radius: 10px;
            padding: 16px 40px;
            color: rgba(0, 212, 255, 0.25);
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: not-allowed;
            text-decoration: none;
            pointer-events: none;
        }

        .download-btn svg { width: 18px; height: 18px; fill: rgba(0, 212, 255, 0.25); }

        .features {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: rgba(0,212,255,0.35);
            letter-spacing: 1px;
        }

        .feature svg { width: 14px; height: 14px; fill: rgba(0,212,255,0.3); }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            color: var(--gray);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.5;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            transition: color 0.3s, opacity 0.3s, border-color 0.3s;
        }

        .back-link:hover {
            color: var(--blue);
            opacity: 1;
            border-color: rgba(0,212,255,0.15);
        }

        .back-link svg { width: 14px; height: 14px; fill: currentColor; }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 28px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(0,212,255,0.06);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 9px;
            color: rgba(255,68,68,0.6);
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
        }

        .version {
            font-size: 9px;
            color: rgba(0,212,255,0.15);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .card { padding: 36px 28px; }
            .subtitle { letter-spacing: 8px; }
            .logo { width: 100px; }
        }
    </style>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === 's' || e.key === 'S')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
        });
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    </script>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-home">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            HOME
        </a>
        <span class="nav-brand">METRO CITY RP</span>
    </nav>

    <div class="bg">
        <img src="images/launcher.png" alt="">
    </div>

    <div class="content">
        <img src="images/logo-transparent.png" alt="Metro City" class="logo">

        <h1 class="title">METRO CITY</h1>
        <p class="subtitle">LAUNCHER</p>

        <div class="card">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            </div>
            <h2>ლაუნჩერი</h2>
            <p class="card-desc">თამაშის დასაწყებად ჩამოტვირთე ლაუნჩერი.<br>სერვერზე შესვლა მარტივია.</p>

            <div class="badge">
                <span class="badge-dot"></span>
                <span>ლაუნჩერი ჯერ ხელმისაწვდომი არარის</span>
            </div>

            <br>

            <a class="download-btn" title="მალე ხელმისაწვდომი იქნება">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                ჩამოტვირთა
            </a>

            <div class="features">
                <div class="feature">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    უსაფრთხო
                </div>
                <div class="feature">
                    <svg viewBox="0 0 24 24"><path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 1.45-.39 2.81-1.06 3.98l1.73 1C21.92 13.89 23 11.56 23 9c0-5.18-3.95-9.45-9-9.95zM12 19c-3.87 0-7-3.13-7-7 0-3.53 2.61-6.43 6-6.92V2.05c-5.06.5-9 4.76-9 9.95 0 5.52 4.47 10 9.99 10 3.31 0 6.24-1.61 8.06-4.09l-1.74-1.01C16.27 18.11 14.24 19 12 19z"/></svg>
                    სწრაფი
                </div>
                <div class="feature">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    მარტივი
                </div>
            </div>

            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                მთავარ გვერდზე დაბრუნება
            </a>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="status">
            <span class="status-dot"></span>
            <span>მიუწვდომელი</span>
        </div>
        <span class="version">v1.0.0</span>
    </div>

</body>
</html>
